l_simp_chinese:

 personality_fallen_empire_machine_lgate: "星门监管者"
 personality_fallen_empire_machine_lgate_desc: "该失落帝国是一个基于对L-星门的监察协议运行的远古人工智能，未对我们造成直接威胁。"
 personality_awakened_fallen_empire_machine_lgate: "防御协议GB-3417"
 personality_awakened_fallen_empire_machine_lgate_desc: "该觉醒帝国由建门者留下的后门程序组成，其所有行动的目的都在于阻止灰之风暴的逃出，与保护这个宇宙。"

 NAME_graygoo_defense: "总控枢纽"
 NAME_graygoo_defense_2: "前哨"
 fallen_lgategrander: "枢纽"
 civic_lgate_effect: "§E无法攻占或殖民星球§!"
 civic_lgate_grander: "无期监视协议"
 civic_lgate_grander_desc: " "
 fallen_grander: "终端哨站"
 01_FALLEN_MACHINE_GRANDER_ENIGMATIC_GREETING_ALL: "宇宙各处§YL-星门§!均处于关闭维护状态，依据建门者的指令，任何国家不得打开L-星门。这是我们对你们文明可以存续的唯一要求。"
 02_FALLEN_MACHINE_GRANDER_ENIGMATIC_GREETING_ALL: "请勿解除L-星门的自我维护周期，灰之风暴目前正被关押，如果其通过L-星门出逃将会对星系带来极大威胁！"
 03_FALLEN_MACHINE_GRANDER_ENIGMATIC_GREETING_ALL: "外交程序已打开，正在接受输入，请讲。只要贵国远离L-星门，我们之间的外交协议便可以继续。"
 04_FALLEN_MACHINE_GRANDER_ENIGMATIC_GREETING_ALL: "建门者们下达了必须永远执行的命令:禁止任何一个星门重新接入亚空间网络，我们必须强迫他国遵守"
 01_FALLEN_MACHINE_GRANDER_WAR_GREETING: "已收到信息，军团节点已上线，战争协议全面运行。预定目标:消灭或重创。预计可行性:高"
 02_FALLEN_MACHINE_GRANDER_WAR_GREETING: "我们必须执行造物主留下的最后一条指令，我们必须守护这个银河免受灰色风暴的影响，因此，战争行为是可被接受的。"
 03_FALLEN_MACHINE_GRANDER_CUSTODIAL_GREETING: "灰色风暴必须被消灭，灰色风暴必须被消灭..."
 Nanites_grander.3.title: "通讯接入"
 Nanites_grander.3.desc: "这是一条警告信息:\n我们已经侦测并确定，[root.GetName]正在试图打开L-星门。\n请勿继续尝试解除L-星门自我维护循环周期！"
 Nanites_grander.3.a: "好的好的"
 Nanites_grander.4.desc: "这是第二次警告:\n我们已经确认，[root.GetName]已经对L-星门有了初步了解，故[root.GetName]的威胁度已经上升，现将对[root.GetName]启动限制协议。\n请放弃一切解除L-星门自我维护循环周期的尝试！"
 Nanites_grander.4.a: "你们管不着"
 Nanites_grander.4.b: "好的"
 mod_research_reduce_lgate: "星枢限制协议"
 mod_produces_reduce_lgate: "星枢限制协议"
 Nanites_grander.5.desc: "§R这是最后一条警告消息§!:\n[root.GetName]认为可以逃脱我们的视野研究L-星门，实则不然，[root.GetName]的一举一动我们都非常清晰。依据建门者灭亡前的最后一条命令，L-星门绝不允许重新接入亚空间网络，必要时，允许使用一切武力手段去阻止终端互联。\n因此，本次警告过后，[root.GetName]的生产设施将会被限制，如果选择继续研究L-星门将会遭到我们的武力打击。"
 Nanites_grander.5.a: "一边去，不要阻止[root.GetName]"
 lgater_war: "星枢防御协议"
 lgate_keepers: "终端监管程序"
 gov_lgate_grander: "远古监管协议"
 lgate_keepers_awake: "卫戍程序"
 mod_fallen_lgater: ""
 gov_lgate_grander_awake: "星河守卫程序"
 Nanites_grander.6.a: "让我们打开天窗说亮话吧"
 gov_lgate_grander_awake_desc: "这个人工智能矩阵为了其造物主最后的命令，决定彻底消灭让造物主都恐惧的存在"
 gov_lgate_grander_desc: "这个人工智能矩阵一直保持着其造物主最后的命令，并视其为绝对不可违背的规则"
 Nanites_grander.6.desc: "[root.GetName]多次无视警告，意图打开L-星门。守门协议已经启动，战争协议全面上线。为了确保灰之风暴不会外逃，[root.GetName]等一切重大威胁因素必须被彻底抹除"
 Nanites_grander.7.desc: "项目失败，未能阻止L-星门维护周期终止。侦测到亚空间信号，正在确认...\n已确认，§R灰之风暴§!已外逃。优先级已经更改，目标:消灭灰之风暴。正在根据预设指令执行布告：\n\n“当你们收到这条信息时证明L-星门已经再度开启了...我们已经在与自己造物的搏斗中处于下风，出于自责和对自己毫无来由的骄傲的弥补，我们激活了所有的后门程序，包括机械仆从在内，都用来把灰之风暴关在L-星团里..我们成功了，但我们也只能独自面对这些无穷无尽的纳米机器。\n希望我们的机械仆从，能够帮助你们度过难关，不论是谁放出了灰之风暴都已经不重要了，我们请求你们，消灭灰之风暴，永远，不要让它再毁坏宇宙..."
 Nanites_grander.9.desc: "[event_target:lgate_grander_fallen.GetName]在灰蛊风暴被彻底消灭后很长一段时间便没有了动静，直到现在一队新的纳米舰队出现在了他的首都，并向我们发出了如下信息:\n\n“建门者指定的威胁已清除，但命令要求我们保护好银河系居民，故[event_target:lgate_grander_fallen.GetName]依旧会旅行自己的职责，协助，帮助银河系居民免受各种威胁的影响。”"
 Nanites_grander.11.title: "守望结束?"
 huh: "太奇怪了吧"
 Nanites_grander.11.desc: "[event_target:lgate_grander_fallen.GetName]在确定德萨努协和国存在后自行断开了所有链接，重新并入了德萨努协和国"
 Nanites_grander.12.desc: "[event_target:lgate_grander_fallen.GetName]在发现L-星团没有什么东西之后很长一段时间便没有了动静，直到现在一队新的纳米舰队出现在了他的首都，并向我们发出了如下信息:\n\n“建门者指定的威胁已清除，但命令要求我们保护好银河系居民，故[event_target:lgate_grander_fallen.GetName]依旧会旅行自己的职责，协助，帮助银河系居民免受各种威胁的影响。”"
 Nanites_grander.100.desc: "依据星枢监护协议，现在我方将开始向[root.GetName]输送必要物资以帮助[root.GetName]发展。"
 thankful: "感谢"
 mod_lgater_helping: "星枢援助协议"
 get_a_fleet: "获得一支纳米舰队"